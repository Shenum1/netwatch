name: NetWatch CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Python ML core ──────────────────────────────────────────────────────────
  ml-core:
    name: ML Core (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/ml_core/requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check backend/ml_core --ignore E501

      - name: Run training smoke test
        run: |
          cd backend/ml_core
          python train.py --synthetic --n-samples 2000 --n-estimators 10 --quiet
          echo "Training smoke test passed"

      - name: Test ML core imports
        run: |
          cd backend/ml_core
          python -c "
          from models.detector import AnomalyDetector
          from features.pipeline import extract_features
          from explainers.shap_explainer import explain_prediction
          print('All imports OK')
          "

  # ── Node.js API gateway ─────────────────────────────────────────────────────
  api-gateway:
    name: API Gateway (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/api/package.json

      - name: Install dependencies
        run: cd backend/api && npm install

      - name: Check for syntax errors
        run: |
          cd backend/api
          node --input-type=module << 'EOF'
          import { createServer } from "http";
          console.log("Node.js syntax OK");
          EOF

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: cd frontend && npm install

      - name: Build
        run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Docker build ────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [ml-core, api-gateway, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ML core image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/ml_core
          push: false
          tags: netwatch-ml_core:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build API gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/api
          push: false
          tags: netwatch-api_gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: netwatch-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security scan ────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: npm audit (frontend)
        run: cd frontend && npm install && npm audit --audit-level=high || true

      - name: npm audit (api)
        run: cd backend/api && npm install && npm audit --audit-level=high || true
